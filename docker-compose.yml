version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: miro-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: mirodb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: miro-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@db:5432/mirodb?schema=public
      - JWT_SECRET=votre_secret_inviolable_pour_les_sessions_1234
      - NODE_ENV=development
    volumes:
      - ./backend:/usr/src/app
      # Conserve le node_modules local à l'intérieur du conteneur indépendamment du bind mount système
      - /usr/src/app/node_modules
    command: sh -c "npm install bcryptjs && npm install && npm run dev"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: miro-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  pgdata:
